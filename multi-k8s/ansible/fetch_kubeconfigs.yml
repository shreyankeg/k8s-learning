---
# Fetch kubeconfigs from all 3 masters and save them locally.
# Run with: ansible-playbook fetch_kubeconfigs.yml
#
# After running:
#   export KUBECONFIG=kubeconfigs/master-1.yaml
#   kubectl get nodes

- name: Fetch kubeconfigs from masters
  hosts: masters
  become: true
  gather_facts: false

  tasks:
    - name: Fetch raw kubeconfig from master
      fetch:
        src: /etc/rancher/rke2/rke2.yaml
        dest: "kubeconfigs/{{ inventory_hostname }}.yaml"
        flat: true

    - name: Replace loopback address with master public IP
      replace:
        path: "kubeconfigs/{{ inventory_hostname }}.yaml"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ ansible_host }}:6443"
      delegate_to: localhost
      become: false

    - name: Display kubeconfig path
      debug:
        msg: "Saved: kubeconfigs/{{ inventory_hostname }}.yaml  →  kubectl --kubeconfig kubeconfigs/{{ inventory_hostname }}.yaml get nodes"
      delegate_to: localhost
      become: false
