---
- name: Read node token directly from master (avoids cross-play fact dependency)
  slurp:
    src: /var/lib/rancher/rke2/server/node-token
  delegate_to: "{{ master_host }}"
  register: _rke2_token

- name: Set token fact
  set_fact:
    rke2_node_token: "{{ _rke2_token.content | b64decode | trim }}"

- name: Create RKE2 config directory
  file:
    path: /etc/rancher/rke2
    state: directory
    mode: "0755"

- name: Write RKE2 agent config
  template:
    src: config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: "0644"

- name: Download RKE2 install script
  get_url:
    url: https://get.rke2.io
    dest: /tmp/install-rke2.sh
    mode: "0755"
    timeout: 60

- name: Install RKE2 agent binaries
  command: /tmp/install-rke2.sh
  environment:
    INSTALL_RKE2_TYPE: agent
    INSTALL_RKE2_VERSION: "{{ rke2_version | default('') }}"
  args:
    creates: /usr/local/bin/rke2

- name: Enable and start rke2-agent service
  systemd:
    name: rke2-agent
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for agent to register with master
  pause:
    seconds: 30
