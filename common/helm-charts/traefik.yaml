---
# Traefik — Kubernetes Ingress controller
#
# To upgrade/downgrade: change `version` and re-run deploy-helm-charts-traefik.yml.
# RKE2's helm-controller will reconcile the change automatically.
#
# Docs: https://doc.traefik.io/traefik/
# Chart: https://github.com/traefik/traefik-helm-chart
#
# Service type:
#   LoadBalancer  — creates an AWS ELB (default, recommended for production)
#   NodePort      — exposes on a high port on each node (no ELB cost, good for dev)
#
# Note: RKE2's bundled rke2-ingress-nginx is disabled in the server
# config.yaml (`disable: rke2-ingress-nginx`) so Traefik is the only
# ingress controller on the cluster.

apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: traefik
  namespace: kube-system
spec:
  repo: https://traefik.github.io/charts
  chart: traefik
  version: "35.2.0"
  targetNamespace: traefik
  createNamespace: true
  valuesContent: |-
    deployment:
      replicas: 2
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    ingressClass:
      enabled: true
      isDefaultClass: true
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
