---
# cert-manager — TLS certificate management (Let's Encrypt, self-signed, etc.)
#
# To upgrade/downgrade: change `version` and re-run deploy-helm-charts.yml.
# RKE2's helm-controller will reconcile the change automatically.
#
# Docs: https://cert-manager.io/docs/installation/helm/

apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  repo: https://charts.jetstack.io
  chart: cert-manager
  version: "v1.16.2"
  targetNamespace: cert-manager
  createNamespace: true
  valuesContent: |-
    installCRDs: true
    replicaCount: 1
