---
# ingress-nginx — Kubernetes Ingress controller
#
# To upgrade/downgrade: change `version` and re-run deploy-helm-charts-nginx.yml.
# RKE2's helm-controller will reconcile the change automatically.
#
# Docs: https://kubernetes.github.io/ingress-nginx/
#
# Service type:
#   LoadBalancer  — creates an AWS ELB (default, recommended for production)
#   NodePort      — exposes on a high port on each node (no ELB cost, good for dev)

apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: ingress-nginx
  namespace: kube-system
spec:
  repo: https://kubernetes.github.io/ingress-nginx
  chart: ingress-nginx
  version: "4.11.3"
  targetNamespace: ingress-nginx
  createNamespace: true
  valuesContent: |-
    controller:
      replicaCount: 2
      service:
        type: LoadBalancer
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      ingressClassResource:
        default: true
